<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}成长记录{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">
                🌱 成长记录
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">时间线</a>
                <a href="{{ url_for('add') }}" class="nav-link nav-add-btn">+ 添加记录</a>
            </div>
        </div>
    </nav>

    <!-- Flash 消息 -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="container flash-container">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}" onclick="this.remove()">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- 主内容 -->
    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>🌱 记录每一个成长瞬间</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
